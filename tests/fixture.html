<!DOCTYPE html>
<html>
<head><title>Test Fixture</title></head>
<body>
  <h1>Test Page</h1>
  <a href="https://example.com">Example Link</a>
  <form>
    <label for="name">Name</label>
    <input id="name" type="text" placeholder="Enter name">
    <label for="color">Color</label>
    <select id="color">
      <option value="red">Red</option>
      <option value="blue">Blue</option>
      <option value="green">Green</option>
    </select>
    <label for="agree">Agree</label>
    <input id="agree" type="checkbox">
    <label for="file">File</label>
    <input id="file" type="file" onchange="document.getElementById('output').textContent='uploaded:' + this.files[0].name">
    <button type="button" id="btn" onclick="document.getElementById('output').textContent='clicked'">Submit</button>

  </form>
  <p id="output">ready</p>
</body>
</html>
